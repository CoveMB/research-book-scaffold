minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=md", "--markdown-linebreak-ext=qmd"]
        exclude: ^(skill-plugins|exports)/
      - id: end-of-file-fixer
        exclude: ^(skill-plugins|exports)/
      - id: check-yaml
        exclude: ^skill-plugins/
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=5120"]
        exclude: ^(skill-plugins|exports)/
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: make-lint
        name: Python compile check
        entry: make lint
        language: system
        pass_filenames: false
        types_or: [python]

      - id: make-check-citations
        name: Manuscript citation check
        entry: make check-citations
        language: system
        pass_filenames: false
        files: ^(manuscript/|bibliography/references\.bib)

      - id: make-check-links
        name: Internal wiki link check
        entry: make check-links
        language: system
        pass_filenames: false
        files: ^(notes|manuscript|research)/.*\.(md|qmd)$

      - id: make-check-manuscript-readiness
        name: Manuscript scaffold readiness check
        entry: make check-manuscript-readiness
        language: system
        pass_filenames: false
        files: ^manuscript/
        stages: [manual]
