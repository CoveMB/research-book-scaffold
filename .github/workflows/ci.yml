name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Scaffold QA (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository and vendored submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python, Git, and Make versions
        run: |
          python3 --version
          git --version
          make --version

      - name: Compile-check Python scripts and QA tools
        run: make lint

      - name: Run script and end-to-end tests
        run: make test

      - name: Scan Markdown and Quarto placeholders
        run: make check-placeholders

      - name: Check manuscript citations against bibliography
        run: make check-citations

      - name: Check wiki-style internal links
        run: make check-links

      - name: Validate external skill integration
        run: make check-external-skills

      - name: Validate Obsidian artifact files
        run: make check-obsidian-artifacts
